# Enable RBAC. RBAC is necessary to use Kubernetes integration
enableRbac: false

extraClusterRoles:
  # - apiGroups:
  #   - some-group
  #   resources:
  #   - some-resource
  #   verbs:
  #   - get

serviceAccount:
  # Specify a different service account name. When blank it will default to the release
  # name if *create* is enabled, otherwise it will refer to the default service account.
  name: "homepage"
  # Create service account. Needed when RBAC is enabled.
  create: true

controllers:
  main:
    type: deployment
    pod:
      automountServiceAccountToken: true
      serviceAccountName: "homepage"
    strategy: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    containers:
      main:
        image:
          repository: ghcr.io/gethomepage/homepage
        env:
          - name: HOMEPAGE_ALLOWED_HOSTS
            value: null
        # resources:
        #   requests:
        #     memory: 10Mi
        #     cpu: 10m
        #   limits:
        #     memory: 200Mi
        #     cpu: 500m

# DNS settings for all pods (common v5 style).
# defaultPodOptions:
#   dnsPolicy: ClusterFirst
#   dnsConfig:
#     nameservers:
#       - 8.8.8.8
#       - 8.8.4.4
#     options:
#       - name: ndots
#         value: "1"
#
# Legacy compatibility (still supported by this chart):
# dnsPolicy: ClusterFirst
# dnsConfig:
#   nameservers:
#     - 8.8.8.8
#   options:
#     - name: ndots
#       value: "1"

service:
  main:
    controller: main
    ports:
      http:
        port: 3000

# Enable the ingress to expose Homepage to the network.
ingress:
  main:
    enabled: false
    # labels:
    #   # This label will enable discover of this deployment in Homepage
    #   gethomepage.dev/enabled: "true"
    # annotations:
    #   # These annotations will configure how this deployment is shown in Homepage
    #   gethomepage.dev/name: "Homepage"
    #   gethomepage.dev/description: "A modern, secure, highly customizable application dashboard."
    #   gethomepage.dev/group: "A New Group"
    #   gethomepage.dev/icon: "homepage.png"
    # ingressClassName: "nginx"
    # hosts:
    #   - host: &host "homepage.local"
    #     paths:
    #       - path: /
    #         pathType: Prefix
    # tls:
    #   - hosts:
    #       - *host

# All the config files for Homepage can be specified under their relevant config block.
config:
  # To use an existing ConfigMap uncomment this line and specify the name
  # useExistingConfigMap: existing-homepage-configmap
  bookmarks:
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/

  services:
    - My First Group:
        - My First Service:
            href: http://localhost/
            description: Homepage is awesome

    - My Second Group:
        - My Second Service:
            href: http://localhost/
            description: Homepage is the best

    - My Third Group:
        - My Third Service:
            href: http://localhost/
            description: Homepage is 😎
  widgets:
    - resources:
        # change backend to 'kubernetes' to use Kubernetes integration. Requires RBAC.
        backend: resources
        expanded: true
        cpu: true
        memory: true
    - search:
        provider: duckduckgo
        target: _blank
    ## Uncomment to enable Kubernetes integration
    # - kubernetes:
    #     cluster:
    #       show: true
    #       cpu: true
    #       memory: true
    #       showLabel: true
    #       label: "cluster"
    #     nodes:
    #       show: true
    #       cpu: true
    #       memory: true
    #       showLabel: true
  kubernetes:
    # change mode to 'cluster' to use RBAC service account
    mode: disable
    # Uncomment to enable gateway api HttpRoute discovery.
    #gateway: true
  docker:
  settings:

  # all sections can alternately be appended with "String" such as this example settings. This is useful
  # for defining a stable ordering. Unfortunately Go's (and therefore Helm's) toYaml function sorts keys
  # and loses and input ordering. Using a string is the best way around this.
  settingsString: |
    title: Homepage
    headerStyle: boxed
    layout:
      My First Group:
      My Second Group:
      My Third Group:

persistence:
  logs:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /app/config/logs
